<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CSS global -->
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>
    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { ListeMovies } from "./component/ListeMovies/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { SelecProfils } from "./component/SelecProfils/script.js";
      import { DataProfils } from "./data/dataProfils.js";

      // -----------------------------
      // Définition des objets globaux
      // -----------------------------
      window.C = {};
      window.V = {};

      // -----------------------------
      // Sélection d’un profil
      // -----------------------------
      C.selectProfil = function (id, age) {
        localStorage.setItem("profilAge", age);
        C.loadMovies();
      };

      // -----------------------------
      // Modifier un profil
      // -----------------------------
      C.editProfil = async function (id) {
        let profils = await DataProfils.requestProfils();
        let profil = profils.find(p => p.id == id);

        document.querySelector("#content").innerHTML = `
          <div class="edit-profil-form">
              <h2>Modifier le profil</h2>

              <label>Nom :</label>
              <input id="editName" value="${profil.name}">

              <label>Avatar (nom de fichier) :</label>
              <input id="editAvatar" value="${profil.avatar.replace('/server/images/', '')}">

              <label>Restriction d'âge :</label>
              <select id="editAge">
                  <option value="0" ${profil.age_restriction==0?'selected':''}>0</option>
                  <option value="12" ${profil.age_restriction==12?'selected':''}>12</option>
                  <option value="16" ${profil.age_restriction==16?'selected':''}>16</option>
                  <option value="18" ${profil.age_restriction==18?'selected':''}>18</option>
              </select>

              <button onclick="C.saveProfil(${id})">Enregistrer</button>
          </div>
        `;
      };

      C.saveProfil = function (id) {
        let formData = new FormData();
        formData.append("id", id);
        formData.append("name", document.getElementById("editName").value);
        formData.append("avatar", document.getElementById("editAvatar").value);
        formData.append("age_restriction", document.getElementById("editAge").value);

        fetch("../server/script.php?todo=updateprofile", {
          method: "POST",
          body: formData
        })
        .then(r => r.json())
        .then(res => {
          if (res.success) {
            alert(res.success);
            C.loadProfils();
          } else {
            alert(res.error);
          }
        });
      };

      // -----------------------------
      // Handlers principaux
      // -----------------------------
      C.handlerAbout = function () {
        alert("Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !");
      };

      C.handlerHome = function () {
        C.loadMovies();
      };

      C.handlerProfil = function () {
        C.loadProfils();
      };

      C.handlerDetail = function (id) {
        DataMovie.requestMovieDetails(id)
          .then(function (movie) {
            document.querySelector("#content").innerHTML = MovieDetail.format(movie);
          })
          .catch(function (error) {
            console.error("Erreur lors du chargement du film :", error);
          });
      };

      // -----------------------------
      // Chargement des films (avec âge)
      // -----------------------------
      C.loadMovies = function () {
        let profilAge = parseInt(localStorage.getItem("profilAge") || 0);

        DataMovie.requestMovies(profilAge)
          .then(function (categories) {

            if (!categories || categories.length === 0) {
              document.querySelector("#content").innerHTML =
                "<p style='color:white; text-align:center; margin-top:50px;'>Aucun film disponible pour votre tranche d'âge.</p>";
              return;
            }

            document.querySelector("#content").innerHTML =
              ListeMovies.formatMany(categories, "C.handlerDetail");
          })
          .catch(function (error) {
            console.error("Erreur lors du chargement des films :", error);
          });
      };

      // -----------------------------
      // Chargement des profils
      // -----------------------------
      C.loadProfils = async function () {
        let content = document.querySelector("#content");
        content.innerHTML = "";
        V.renderSelecProfils();
      };

      // -----------------------------
      // Fonctions de rendu (V)
      // -----------------------------
      V.renderListeFilms = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML += ListeMovies.formatMany(data);
      };

      V.renderMovieDetail = async function (id) {
        let data = await DataMovie.requestFullMovie(id);
        let content = document.querySelector("#content");
        content.innerHTML += MovieDetail.format(data);
      };

      V.renderMovieCategory = async function () {
        let data = await DataCategory.requestCategoryExist();
        let content = document.querySelector("#content");
        content.innerHTML += MovieCategory.formatMany(data);

        for (let c of data) {
          let datafilm = await DataMovie.requestMoviesCategory(c.id);
          let position = document.querySelector(".listeCateg" + c.id);
          position.innerHTML = ListeMovies.formatMany(datafilm);
        }
      };

      V.renderSelecProfils = async function () {
        let content = document.querySelector("#content");
        let data = await DataProfils.requestProfils();
        content.innerHTML += SelecProfils.formatMany(data);
      };

      // -----------------------------
      // Démarrage de l'application
      // -----------------------------
      C.start = function () {

        // ⭐ Injection correcte de la NavBar
        document.querySelector("#header").innerHTML = NavBar.format(
          "C.handlerAbout()",
          "C.handlerHome()",
          "C.handlerProfil()"
        );

        C.loadProfils();
      };

      C.start();
    </script>
  </body>
</html>
