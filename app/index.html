<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/NavBar/style.css" />
    <link rel="stylesheet" href="./component/section1/style.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";

      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.handlerHome = function () {
        C.loadMovies();
      };

      C.handlerDetail = async function (id) {
        try {
          const movie = await DataMovie.requestMovieDetails(id);
          V.renderMovieDetail(movie);
        } catch (error) {
          console.error("Erreur lors du chargement des détails du film:", error);
        }
      };

      C.loadMovies = async function () {
        try {
          const movies = await DataMovie.requestMovies();
          V.renderSection1(movies);
        } catch (error) {
          console.error("Erreur lors du chargement des films:", error);
        }
      };

      window.V = {};

      V.renderNavBar = function (hAbout, hHome) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome);
      };

      V.renderSection1 = function (movies) {
        let content = document.querySelector("#content");
        content.innerHTML = `<h2 class="h2">grid</h2><div class="grid">${Movie.format(movies)}</div>`;
      };

      V.renderMovieDetail = function (movie) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie);
      };

      C.start = function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerHome()");
        C.loadMovies();
      };

      C.start();
    </script>
  </body>
</html>
