<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./component/NavBar/style.css" />
    <link rel="stylesheet" href="./component/MovieCategory/style.css" />
    <link rel="stylesheet" href="./component/section1/style.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";

      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.handlerHome = function () {
        C.loadMovies();
      };

      C.handlerDetail = function (id) {
        DataMovie.requestMovieDetails(id).then(function(movie) {
          V.renderMovieDetail(movie);
        }).catch(function(error) {
          console.error("Erreur lors du chargement des détails du film:", error);
        });
      };

      C.loadMovies = function () {
        DataMovie.requestMovies().then(function(categories) {
          V.renderSection1(categories);
        }).catch(function(error) {
          console.error("Erreur lors du chargement des films:", error);
        });
      };

      window.V = {};

      V.renderNavBar = function (hAbout, hHome) {
        var header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hHome);
      };

      V.renderSection1 = function (categories) {
        var content = document.querySelector("#content");
        content.innerHTML = categories
          .map((category) => MovieCategory.format(category.category, category.movies))
          .join("");
      };

      V.renderMovieDetail = function (movie) {
        var content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie);
      };

      C.start = function () {
        V.renderNavBar("C.handlerAbout()", "C.handlerHome()");
        C.loadMovies();
      };

      C.start();
    </script>
  </body>
</html>
