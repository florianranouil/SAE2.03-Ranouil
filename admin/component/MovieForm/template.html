<form id="movieForm">
  <h2>Ajouter un film</h2>

  <div>
    <label>Titre</label>
    <input type="text" name="name" required>
  </div>

  <div>
    <label>Réalisateur</label>
    <input type="text" name="director" required>
  </div>

  <div>
    <label>Année</label>
    <input type="number" name="year" min="1900" max="2030" required>
  </div>

  <div>
    <label>Durée (min)</label>
    <input type="number" name="length" min="1" required>
  </div>

  <div>
    <label>Description</label>
    <input type="text" name="description" required>
  </div>

  <div>
    <label>Catégorie</label>
    <select id="id_category" name="id_category" required>
      <option value="">Choisir...</option>
    </select>
  </div>

  <div>
    <label>Image</label>
    <input type="text" name="image" required>
  </div>

  <div>
    <label>Lien Trailer</label>
    <input type="url" name="trailer" required>
  </div>

  <div>
    <label>Âge min</label>
    <input type="number" name="min_age" min="0" required>
  </div>

  <button type="submit">Enregistrer</button>
</form>
